<div class="card componentStyle p-3">

  <!-- New Category Button -->
  <div class="text-end mb-3">
    <button class="btn btn-primary" (click)="addCategory()" data-bs-toggle="modal" data-bs-target="#categoryModal">
      New Category
    </button>
  </div>

  <!-- Category Table -->
  <div class="table-responsive">
    <table class="table table-bordered mb-0">
      <thead class="bg-light">
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Description</th>
          <th style="width: 15%;">Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let category of categories | slice: (page-1)*pageSize : page*pageSize; let i = index">
          <td>{{ i + 1 }}</td>
          <td>{{ category.name }}</td>
          <td>{{ category.description }}</td>
          <td>
            <button class="btn btn-secondary btn-sm" (click)="editCategory(category)" data-bs-toggle="modal" data-bs-target="#categoryModal">
              <i class="bi bi-pencil-square"></i>
            </button>
            &nbsp;
            <button class="btn btn-danger btn-sm" (click)="deleteCategory(category.id!)">
              <i class="bi bi-trash"></i>
            </button>
          </td>
        </tr>
        <tr *ngIf="categories.length === 0">
          <td colspan="4" class="text-center py-3">No categories found.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Pagination -->
  <div class="d-flex justify-content-between align-items-center mt-2">
    <ngb-pagination [(page)]="page" [pageSize]="pageSize" [collectionSize]="categories.length"></ngb-pagination>
    <select class="form-select w-auto" [(ngModel)]="pageSize">
      <option [ngValue]="2">2 per page</option>
      <option [ngValue]="4">4 per page</option>
      <option [ngValue]="6">6 per page</option>
    </select>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="categoryModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">{{ modalHeader }}</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <form [formGroup]="categoryForm">
            <div class="mb-3">
              <input formControlName="name" class="form-control" placeholder="Category Name">
            </div>
            <div class="mb-3">
              <textarea formControlName="description" class="form-control" rows="3" placeholder="Description"></textarea>
            </div>
          </form>
        </div>

        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button class="btn btn-primary" [disabled]="categoryForm.invalid" (click)="saveCategory()">Save</button>
        </div>

      </div>
    </div>
  </div>

</div>
