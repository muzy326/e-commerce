<div class="container mt-5">

    <div class="card p-4 shadow">

        <h3 class="text-center mb-4">
            Reset Password
        </h3>

        <input
            class="form-control mb-3"
            type="email"
            placeholder="Enter Email"
            [(ngModel)]="email">

        <input
            class="form-control mb-3"
            type="password"
            placeholder="Enter New Password"
            [(ngModel)]="password">

        <button
            class="btn btn-primary w-100"
            (click)="resetPassword()">

            Reset Password

        </button>

    </div>

</div>
